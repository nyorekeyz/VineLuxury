<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VL | Luxury Apparel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        /* Color Palette: Black #0a0a0a, Gold #D4AF37 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
            border: 1px solid #222;
            margin: 15px;
        }

        nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
            max-width: 1200px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: #D4AF37;
            font-weight: 700;
            letter-spacing: 10px;
        }

        .hero-content {
            max-width: 800px;
        }

        .hero-content h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 20px;
            color: #fff;
        }

        .hero-content p {
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #D4AF37;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            text-decoration: none;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .btn:hover {
            background-color: #D4AF37;
            color: #0a0a0a;
            cursor: pointer;
        }

        section {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .item {
            height: 450px;
            background: #111;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: 0.3s;
        }

        .item:hover {
            border-color: #D4AF37;
        }

        .item-label {
            position: absolute;
            bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
        }

        footer {
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid #222;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #444;
        }

        /* Subtle scroll animation */
        .fade-in {
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div>Collections</div>
            <div class="logo">VL</div>
            <div>Bespoke</div>
        </nav>

        <div class="hero-content fade-in">
            <p>Defining Modern Elegance</p>
            <h1>THE GOLD STANDARD</h1>
            <a href="#" class="btn">Explore Atelier</a>
        </div>

        <div style="font-size: 0.7rem; letter-spacing: 5px; color: #444;">EST. 2024</div>
    </header>

    <section id="collection">
        <h2 style="font-family: 'Cinzel'; letter-spacing: 5px; color: #D4AF37;">SEASONAL CURATION</h2>
        <div class="collection-grid">
            <div class="item">
                <span style="color: #222; font-size: 5rem; font-family: 'Cinzel';">I</span>
                <div class="item-label">Velvet Evening</div>
            </div>
            <div class="item">
                <span style="color: #222; font-size: 5rem; font-family: 'Cinzel';">II</span>
                <div class="item-label">Silk Essentials</div>
            </div>
            <div class="item">
                <span style="color: #222; font-size: 5rem; font-family: 'Cinzel';">III</span>
                <div class="item-label">Signature Gold</div>
            </div>
        </div>
    </section>

    <footer>
        &copy; 2026 VL LUXURY HOUSE. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
